name: CI

on:
  push:
    branches:
      - "**"
  pull_request:
    branches:
      - main

jobs:
  quality:
    name: Tests and contract checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: |
            requirements.txt
            pyproject.toml
            setup.py

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          if [ -f pyproject.toml ]; then pip install -e .; fi

      - name: Basic lint / syntax check
        run: |
          python -m compileall src tests scripts

      - name: Run unit tests
        run: |
          python -m pytest -v

      - name: Run contract tests
        run: |
          python -m pytest -m contract -v -s

  pipeline-artifact:
    name: Pipeline and artifact upload
    runs-on: ubuntu-latest
    needs: quality
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: |
            requirements.txt
            pyproject.toml
            setup.py

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          if [ -f pyproject.toml ]; then pip install -e .; fi

      - name: Run full pipeline
        run: |
          chmod +x run_pipeline.sh
          ./run_pipeline.sh

      - name: Upload trained artifact
        uses: actions/upload-artifact@v4
        with:
          name: log-triage-artifacts
          path: artifacts/
          if-no-files-found: error
          retention-days: 7
