name: CI

on:
  push:
    branches:
      - "**"
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  quality:
    name: quality
    runs-on: ubuntu-latest
    env:
      LOG_TRIAGE_DISABLE_LLM: "1"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: |
            requirements.txt
            pyproject.toml
            setup.py

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          if [ -f pyproject.toml ]; then pip install -e .; fi

      - name: Train model for tests
        run: python -m src.log_triage.train

      - name: Basic lint / syntax check
        run: |
          python -m compileall src tests scripts

      - name: Run deterministic tests
        run: |
          python -m pytest -v -s -m "not integration and not llm_integration"

  pipeline-artifact:
    name: pipeline-artifact
    runs-on: ubuntu-latest
    needs: quality
    if: github.ref == 'refs/heads/main'
    env:
      LOG_TRIAGE_DISABLE_LLM: "1"
    outputs:
      artifact_name: ${{ steps.latest_artifact.outputs.artifact_name }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: |
            requirements.txt
            pyproject.toml
            setup.py

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          if [ -f pyproject.toml ]; then pip install -e .; fi

      - name: Run full deterministic pipeline
        run: |
          chmod +x run_pipeline.sh
          ./run_pipeline.sh

      - name: Validate Quality Gate evidence exists
        run: |
          test -f evidence/quality_gate/quality_gate_report.json
          test -f evidence/quality_gate/quality_gate_report.md
          test -f evidence/quality_gate/sample_decision.json
          test -f evidence/quality_gate/manifest_hashes.json

          python - <<'PY'
          import json
          from pathlib import Path

          report = json.loads(Path("evidence/quality_gate/quality_gate_report.json").read_text())

          assert report["status"] == "passed"
          assert report["quality_gate_report_version"] >= 1
          assert report["report_generated_at"]
          assert report["pipeline_run_id"]
          assert report["git_sha"]

          artifact = report["artifact"]
          assert artifact["artifact_id"]
          assert artifact["model_version"]
          assert artifact["hashes"]

          required_checks = [
              "policy_tests",
              "artifact_tests",
              "quality_gate_report_tests",
              "prediction_contract_tests",
              "smoke_prediction",
              "traceability_integration",
              "deterministic_test_suite",
          ]

          missing = [
              check for check in required_checks
              if report["checks"].get(check) != "passed"
          ]

          if missing:
              raise SystemExit(f"Missing or failed Quality Gate checks: {missing}")

          print("Quality Gate evidence validated.")
          PY

      - name: Read Quality Gate metadata
        id: quality_gate
        run: |
          python - <<'PY' >> "$GITHUB_OUTPUT"
          import json
          from pathlib import Path

          report = json.loads(Path("evidence/quality_gate/quality_gate_report.json").read_text())
          artifact = report["artifact"]

          print(f"pipeline_run_id={report['pipeline_run_id']}")
          print(f"artifact_id={artifact['artifact_id']}")
          print(f"model_version={artifact['model_version']}")
          PY

      - name: Add Quality Gate report to job summary
        run: |
          cat evidence/quality_gate/quality_gate_report.md >> "$GITHUB_STEP_SUMMARY"

      - name: Upload Quality Gate evidence
        uses: actions/upload-artifact@v4
        with:
          name: quality-gate-evidence-${{ steps.quality_gate.outputs.pipeline_run_id }}-${{ steps.quality_gate.outputs.model_version }}
          path: evidence/quality_gate/
          if-no-files-found: error
          retention-days: 30

      - name: Find latest artifact
        id: latest_artifact
        run: |
          latest="$(ls -td artifacts/log-triage-* | head -n 1)"
          echo "artifact_dir=$latest" >> "$GITHUB_OUTPUT"
          echo "artifact_name=$(basename "$latest")" >> "$GITHUB_OUTPUT"
          echo "Latest artifact: $latest"

      - name: Upload trained artifact
        uses: actions/upload-artifact@v4
        with:
          name: log-triage-artifact
          path: ${{ steps.latest_artifact.outputs.artifact_dir }}
          if-no-files-found: error
          retention-days: 7

  traceability-integration:
    name: traceability-integration
    runs-on: ubuntu-latest
    needs: quality
    if: github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'
    env:
      LOG_TRIAGE_DISABLE_LLM: "1"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: |
            requirements.txt
            pyproject.toml
            setup.py

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          if [ -f pyproject.toml ]; then pip install -e .; fi

      - name: Run traceability integration test
        run: |
          python -m pytest tests/test_traceability_integration.py -v -s

  llm-integration:
    name: llm-integration
    runs-on: ubuntu-latest
    needs: pipeline-artifact
    if: github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'
    env:
      LOG_TRIAGE_ENABLE_LLM_INTEGRATION: "1"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: |
            requirements.txt
            pyproject.toml
            setup.py

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          if [ -f pyproject.toml ]; then pip install -e .; fi

      - name: Download trained artifact
        uses: actions/download-artifact@v4
        with:
          name: log-triage-artifact
          path: artifacts/_ci

      - name: Restore artifact layout
        run: |
          mkdir -p "artifacts/${{ needs.pipeline-artifact.outputs.artifact_name }}"
          mv artifacts/_ci/* "artifacts/${{ needs.pipeline-artifact.outputs.artifact_name }}/"
          rmdir artifacts/_ci

      - name: Run LLM integration test
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          LOG_TRIAGE_DISABLE_LLM: "0"
          LOG_TRIAGE_ENABLE_LLM_INTEGRATION: "1"
        run: |
          python -m pytest tests/test_llm_integration.py -v -s
