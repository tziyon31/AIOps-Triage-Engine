name: CI

on:
  push:
    branches:
      - "**"
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  quality:
    name: quality
    runs-on: ubuntu-latest
    env:
      LOG_TRIAGE_DISABLE_LLM: "1"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: |
            requirements.txt
            pyproject.toml
            setup.py

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          if [ -f pyproject.toml ]; then pip install -e .; fi

      - name: Train model for tests
        run: python -m src.log_triage.train

      - name: Basic lint / syntax check
        run: |
          python -m compileall src tests scripts

      - name: Run deterministic tests
        run: |
          python -m pytest -v -s -m "not integration and not llm_integration"

  pipeline-artifact:
    name: pipeline-artifact
    runs-on: ubuntu-latest
    needs: quality
    if: github.ref == 'refs/heads/main'
    env:
      LOG_TRIAGE_DISABLE_LLM: "1"
    outputs:
      artifact_name: ${{ steps.quality_gate.outputs.artifact_id }}
      decision_artifact_upload_name: decision-artifact-${{ steps.quality_gate.outputs.pipeline_run_id }}-${{ steps.quality_gate.outputs.model_version }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: |
            requirements.txt
            pyproject.toml
            setup.py

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          if [ -f pyproject.toml ]; then pip install -e .; fi

      - name: Run pipeline
        run: |
          chmod +x run_pipeline.sh
          ./run_pipeline.sh

      - name: Validate Quality Gate evidence
        run: python scripts/validate_quality_gate_evidence.py

      - name: Read Quality Gate metadata
        id: quality_gate
        run: |
          python - <<'PY' >> "$GITHUB_OUTPUT"
          import json
          from pathlib import Path

          report = json.loads(Path("evidence/quality_gate/quality_gate_report.json").read_text())
          artifact = report["artifact"]

          print(f"pipeline_run_id={report['pipeline_run_id']}")
          print(f"artifact_id={artifact['artifact_id']}")
          print(f"model_version={artifact['model_version']}")
          print(f"artifact_dir={artifact['artifact_dir']}")
          PY

      - name: Upload Decision Artifact
        uses: actions/upload-artifact@v4
        with:
          name: decision-artifact-${{ steps.quality_gate.outputs.pipeline_run_id }}-${{ steps.quality_gate.outputs.model_version }}
          path: ${{ steps.quality_gate.outputs.artifact_dir }}
          if-no-files-found: error
          retention-days: 30

      - name: Upload Quality Gate evidence
        uses: actions/upload-artifact@v4
        with:
          name: quality-gate-evidence-${{ steps.quality_gate.outputs.pipeline_run_id }}-${{ steps.quality_gate.outputs.model_version }}
          path: evidence/quality_gate/
          if-no-files-found: error
          retention-days: 30

      - name: Add Quality Gate report to job summary
        run: cat evidence/quality_gate/quality_gate_report.md >> "$GITHUB_STEP_SUMMARY"

  traceability-integration:
    name: traceability-integration
    runs-on: ubuntu-latest
    needs: quality
    if: github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'
    env:
      LOG_TRIAGE_DISABLE_LLM: "1"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: |
            requirements.txt
            pyproject.toml
            setup.py

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          if [ -f pyproject.toml ]; then pip install -e .; fi

      - name: Run traceability integration test
        run: |
          python -m pytest tests/test_traceability_integration.py -v -s

  llm-integration:
    name: llm-integration
    runs-on: ubuntu-latest
    needs: pipeline-artifact
    if: github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'
    env:
      LOG_TRIAGE_ENABLE_LLM_INTEGRATION: "1"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: |
            requirements.txt
            pyproject.toml
            setup.py

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          if [ -f pyproject.toml ]; then pip install -e .; fi

      - name: Download trained artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ needs.pipeline-artifact.outputs.decision_artifact_upload_name }}
          path: artifacts/_ci

      - name: Restore artifact layout
        run: |
          mkdir -p "artifacts/${{ needs.pipeline-artifact.outputs.artifact_name }}"
          mv artifacts/_ci/* "artifacts/${{ needs.pipeline-artifact.outputs.artifact_name }}/"
          rmdir artifacts/_ci

      - name: Run LLM integration test
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          LOG_TRIAGE_DISABLE_LLM: "0"
          LOG_TRIAGE_ENABLE_LLM_INTEGRATION: "1"
        run: |
          python -m pytest tests/test_llm_integration.py -v -s
